name: Health Check

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Secrets
        env:
          PONYFLASH_API_KEY: ${{ secrets.PONYFLASH_API_KEY }}
        run: |
          if [ -z "$PONYFLASH_API_KEY" ]; then
            echo "❌ PONYFLASH_API_KEY 未配置"
            exit 1
          fi
          echo "✅ 配置正常"
