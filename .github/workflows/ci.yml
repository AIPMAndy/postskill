name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
    
    - name: Install lint tools
      run: |
        pip install ruff black mypy
    
    - name: Check code format (Black)
      run: black --check --diff . || echo "⚠️ Format check failed, run 'black .' to fix"
      continue-on-error: true
    
    - name: Lint with Ruff
      run: ruff check . || echo "⚠️ Lint issues found"
      continue-on-error: true
    
    - name: Type check with MyPy
      run: mypy . || echo "⚠️ Type check issues found"
      continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        playwright install chromium
    
    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=term || echo "⚠️ Tests failed"
      continue-on-error: true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      if: always()
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  secrets-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Check required secrets
      env:
        PONYFLASH_API_KEY: ${{ secrets.PONYFLASH_API_KEY }}
      run: |
        echo "🔍 检查生产环境 Secrets..."
        
        if [ -z "$PONYFLASH_API_KEY" ]; then
          echo "⚠️ Secret 'PONYFLASH_API_KEY' 未设置"
        else
          echo "✅ Secret 'PONYFLASH_API_KEY' 已配置"
        fi
